<!DOCTYPE html>
<html>
    <head>
        <script src="https://google.com/recaptcha/api.js" async defer></script>
        <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&display=swap" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
        <input type="file" id="file-input" accept=".jpg, .jpeg, .png" style="display: none;">
    <style>

        
        * {
            box-sizing: border-box;
        }
        
        :root {
            --hand-x: 0px;
            --hand-y: 20px;
            --hand-scale:1.1;
        }
 

        .hand-container {
            width: 100%;
            height: 10vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: absolute;
            transform: translate(-50%, -25%);
            top: 50%;
            left: 50%;
            pointer-events: none;
        }

        #pointer-hand {
            display: block;
            margin: 0 auto;
            height: 250px;

            transform-origin: center center;
            will-change: transform;
        }
         
        .title{
        font-family: 'Instrument Serif', serif;
        font-size: 20vh;
        color:rgb(0, 37, 12);
        margin-bottom: 0.1vh;
        margin-top: -10vh;
        transform: translateY(-200px);

        }

        body{
         height: 100vh;
         display: flex;
         background-color: #99735a;
         flex-direction: column;
         justify-content: center;
         align-items: center;
         font-size: 3vh;
         font-weight: 700;
         color:rgb(51, 33, 0);
         font-family: 'Inter', sans-serif;
        }

        .submit {

            background-color:#97a886;
            color:#000000;
            padding: 3vh 7vh;
            border: 3px solid #373d32;
            border-radius: 18px;
            margin-top: 5vh;
            font-family: 'Instrument Serif', serif;
            font-size: 3vh;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s ease; 
            transform: translateY(15vh);

        }

        .submit:hover {
            background-color: #cbcfb4;
            transform: translateY(15vh)scale(1.05);
            
        }

        .captcha-wrapper {
          transform: translateY(17vh);
          
       
        }

        .support {
            transform: translateY(18vh);
            font-size: 2vh;
            color: rgb(209, 196, 179);
            font-weight: 500;
        }

        .inner-square {
            width: 97.5%;
            height: 95%;
            background-color: #bb9f89;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
  
        .submit:disabled{
         opacity: 0.5;
         cursor: not-allowed;
         background-color: grey;
        }

        .square {
            width: 95vw;
            height: 95vh;
            background-color:#66472b;
            border-radius: 20px;
            display: flex;           
            flex-direction: column;  
            justify-content: center; 
            align-items: center;    
        }


    </style>
        <title>Verity</title>
    </head>
    <body>
        <div class="square">
         <div class="inner-square">
         <p>Upload your art to get humanized</p>
         <h1 class="title">Welcome to Verity</h1>
    
         <div class="hand-container">
            <img src="hand.png" id="pointer-hand">
            </div>

        <div class="captcha-wrapper">
            <div class="g-recaptcha"
            data-sitekey="6LeO5s4sAAAAACAz-SaVjZfXPE-DsEds0veOiCH3"
            data-callback="enableBtn"></div>
        </div>

        <div class="support">.jpg and .png supported</div>

         <button class="submit" id="submit-btn" disabled>SUBMIT ART</button>
         </div>
        </div>
   

        <script>
        const submitbtn = document.querySelector('#submit-btn');
        const fileinput = document.querySelector('#file-input');

        submitbtn.addEventListener('click', () =>{
            fileinput.click();
        })
        

        fileinput.addEventListener('change', async (e) =>{
            const file = e.target.files[0];
            if (!file) return;
        

        submitbtn.innerText = "VERIFYING...";
        submitbtn.disabled = true;

        const formData = new FormData();
        formData.append('artImage',file);

        try {
            const response = await fetch('/verify-art', {
                method: 'POST',
                body: formData
            })
            const result = await response.json();
            console.log("Server Result:", result);

            alert("Verification Complete!");
            submitbtn.innerText = "SUBMIT ART";
            submitbtn.disabled = false;


        } catch (err) {
            console.error("upload failer:", err);
            submitbtn.innerText = "ERROR";
        }
        });
  

        function enableBtn(){
            const btn = document.querySelector('#submit-btn');
            btn.disabled = false;
            btn.style.opacity = "1"
        }
        
        const hand = document.querySelector('#pointer-hand');
        document.addEventListener('mousemove', (e) => {
        const rect = hand.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        const diffX = e.clientX - centerX;
        const diffY = e.clientY - centerY;
        const radians = Math.atan2(diffY, diffX);
        const degrees = radians * (180 / Math.PI);
        hand.style.transform = `rotate(${degrees + 275}deg)`

        


    });
    </script>
    </body>
</html>
