<!DOCTYPE html>
<html>
    <head>
        <script src="https://www.google.com/recaptcha/api.js" async defer></script>
        <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&display=swap" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
        <input type="file" id="file-input" accept=".jpg, .jpeg, .png" style="display: none;">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
       
        .loading {
        cursor: wait;
       animation: pulse 1.5s infinite;
      }

      html, body {
    height: 100%;
    overflow: hidden;
}

       @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.5; }
      100% { opacity: 1; }
      }
        
        * {
            box-sizing: border-box;
        }
        
        :root {
            --hand-x: 0px;
            --hand-y: 20px;
            --hand-scale:1.1;
        }
 

        .hand-container {
            width: 100%;
            height: 10vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: absolute;
            transform: translate(-50%, -25%) translateY(-2.5vh);
            top: 50%;
            left: 50%;
            pointer-events: none;
        }

        #pointer-hand {
            display: block;
            margin: 0 auto;
            height: 300px;
 
            transform-origin: center center;
            will-change: transform;
             
        }
         
        .title{
        font-family: 'Instrument Serif', serif;
        font-size: 20vh;
        color:rgb(0, 37, 12);
        
        transform: translateY(-30vh);

        }

        body{
         height: 100vh;
         display: flex;
         background-color: #99735a;
         flex-direction: column;
         justify-content: center;
         align-items: center;
         font-size: 3vh;
         font-weight: 700;
         color:rgb(51, 33, 0);
         font-family: 'Inter', sans-serif;
         touch-action: none;
        }

         p {
            transform: translateY(12.5vh);
        }

        .submit {

            background-color:#97a886;
            color:#000000;
            padding: 3vh 7vh;
            border: 3px solid #373d32;
            border-radius: 18px;
            
            font-family: 'Instrument Serif', serif;
            font-size: 3vh;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s ease; 
            transform: translateY(0vh);

        }

        .submit:hover {
            background-color: #cbcfb4;
            transform: translateY(0vh)scale(1.05);
            
        }

        .captcha-wrapper {
          transform: translateY(-2vh);
          
       
        }

        .support {
            transform: translateY(-0.8vh);
            font-size: 2vh;
            color: rgb(209, 196, 179);
            font-weight: 500;
        }

        .inner-square {
            width: 97.5%;
            height: 95%;
            background-color: #bb9f89;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
  
        .submit:disabled{
         opacity: 0.5;
         cursor: not-allowed;
         background-color: grey;
        }

        .square {
            width: 95vw;
            height: 95vh;
            background-color:#66472b;
            border-radius: 20px;
            display: flex;           
            flex-direction: column;  
            justify-content: center; 
            align-items: center;    
        }

       @media (max-width: 768px) {
    .inner-square {
        width: 97.5%;
        height: 97.5%;
        justify-content: center;
        gap: 1.5vh;
        padding: 2vh 4vw;
    }

    .title {
        font-size: 9vh;
        transform: none;
        text-align: center;
        order: 1;
        margin: 0;
    }

    p {
        transform: none;
        font-size: 2.2vh;
        text-align: center;
        margin: 0;
        order: 2;
    }

    .hand-container {
        position: static;
        transform: none;
        height: auto;
        width: 100%;
        order: 3;
    }

    #pointer-hand {
        height: 18vh;
    }

    .captcha-wrapper {
        transform: scale(0.85);
        transform-origin: center center;
        order: 4;
    }

    .support {
        transform: none;
        font-size: 2vh;
        text-align: center;
        order: 5;
        margin: 0;
    }

    .submit {
        transform: none;
        width: 80vw;
        order: 6;
        margin: 0;
    }

    .submit:hover {
        transform: scale(1.05);
    }

    body {
        transform: none;
    }
}
        

    </style>
        <title>Verity</title>
    </head>
    <body>
        <div class="square">
         <div class="inner-square">
         <p>Upload your art to get humanized</p>
         <h1 class="title">Welcome to Verity</h1>
         


         <div class="hand-container">
            <img src="hand.png" id="pointer-hand">
            </div>

        <div class="captcha-wrapper">
            <div class="g-recaptcha"
            data-sitekey="6LeO5s4sAAAAACAz-SaVjZfXPE-DsEds0veOiCH3"
            data-callback="enableBtn"></div>
        </div>

        <div class="support">.jpg and .png supported</div>

         <button type="button" class="submit" id="submit-btn" disabled>SUBMIT ART</button>
         </div>
        </div>
   

        <script>
        const submitbtn = document.querySelector('#submit-btn');
        const fileinput = document.querySelector('#file-input');

        submitbtn.addEventListener('click', () =>{
            fileinput.click();
        })


fileinput.addEventListener('change', async (e) => {
    e.preventDefault();
    const file = e.target.files[0];
    if (!file) return;



    submitbtn.innerText = "VERIFYING...";
    submitbtn.classList.add('loading');
    submitbtn.disabled = true;

    const formData = new FormData();


    formData.append('artImage', file);
    

    try {
        const response = await fetch('/verify-art', { 
            method: 'POST', 
            body: formData });

        
  
        if (!response.ok) {
            throw new Error(`Server error: ${response.status}`);
        }

        const result = await response.json();

        if (result.status === 'success') {
                
              window.location.href = `Credentials.html?sn=${result.serial}`;
                } else if (result.status === 'fail'){
                window.location.href = 'Rejected.html';  
            } else {
            alert("Error: " + (result.error || "Check server terminal"));
            submitbtn.innerText = "SUBMIT ART";
            submitbtn.disabled = false;
            submitbtn.classList.remove('loading');
            }

            

            

    } catch (err) {
        console.error("Upload failure:", err);
        submitbtn.innerText = "ERROR";
        submitbtn.disabled = false;
        submitbtn.classList.remove('loading');
    }
});
  

        window.enableBtn = function(){
            const btn = document.querySelector('#submit-btn');
            btn.disabled = false;
            btn.style.opacity = "1";
        };
        
        
        const hand = document.querySelector('#pointer-hand');
        document.addEventListener('mousemove', (e) => {
        const rect = hand.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        const diffX = e.clientX - centerX;
        const diffY = e.clientY - centerY;
        const radians = Math.atan2(diffY, diffX);
        const degrees = radians * (180 / Math.PI);
        hand.style.transform = `rotate(${degrees + 275}deg)`
 
        document.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            if(!touch) return;
            updateHand(touch.clientX, touch.clientY);
        });



    });
    </script>
    </body>
</html>
