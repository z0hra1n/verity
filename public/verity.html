<!DOCTYPE html>
<html>
    <head>
        <script src="https://google.com/recaptcha/api.js" async defer></script>
        <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&display=swap" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>

        
        * {
            box-sizing: border-box;
        }
        
        



        body{
         height: 100vh;
         display: flex;
         background-color: #99735a;
         flex-direction: column;
         justify-content: center;
         align-items: center;
         margin: 0;
        }

        .inner-square {
            width: 97.5%;
            height: 95%;
            background-color: #bb9f89;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
  
        .title{
         font-family: 'Instrument Serif', serif;
         font-size: 14.5vh;
         color:rgb(0, 37, 12);
         transform: translateY(10vh) translateX(25vh);

        }



        .happy img {
            height: 80vh;
            width: 60vh;
             transform: translateY(-10vh) translateX(-60vh);
             border-radius: 18px;
             border: 5px solid #66472b;
        }

        .square {
            width: 95vw;
            height: 95vh;
            background-color:#66472b;
            border-radius: 20px;
            display: flex;           
            flex-direction: column;  
            justify-content: center; 
            align-items: center;    
        }

        .input-container {
            display: flex;
            flex-direction: column;
            gap: 2vh;
            position: absolute;
            transform: translateY(-5vh) translateX(-50vw);
        }
 
        input[type="text"]{
            background: rgba(255, 255, 255, 0.2);
            border: 1vh solid #373d32;
            border-radius: 1vh;
            padding: 2vh, 3vh;
            width: 50vw;
            height: 12vw;
            font-family: 'Instrument Serif', serif;
            font-size: 10vh;
            color:#373d32;
            outline:none;
            transition: all 0.3s ease;
            transform: translateX(65vw) translateY(2vw);

        }

        input[type="text"]::placeholder {
            color: rgba(0, 37, 12, 0.6);
            font-weight: 300;
        }

        input[type="text"]:focus {
            background: rgba(255, 255, 255,0.4);
            border-color: #717e63;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }


            .serial {

            background-color:#97a886;
            color:#000000;
            padding: 3vh 7vh;
            border: 3px solid #373d32;
            border-radius: 18px;
            margin-top: 5vh;
            font-family: 'Instrument Serif', serif;
            font-size: 3vh;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s ease; 
            transform: translateY(-25vh) translateX(15vw);
            position: relative;
            }

       
            .serial:hover {
            background-color: #cbcfb4;
            transform: translateY(-25vh) translateX(15vw) scale(1.05);
            
           }

           html {
    height: 100%;
    width: 100%;
    margin: 0;
    padding: 0;
    overflow: hidden;
}

body {
    overflow: hidden;
}

@media (max-width: 768px) {
    html, body {
        overflow: auto;
    }
    
    .inner-square {
        height: 97.5%;
        justify-content: flex-start;
        padding: 3vh 4vw;
        gap: 2vh;
    }

    .title {
        font-size: 6vh;
        transform: none;
        text-align: center;
        order: 1;
    }

    .happy {
        order: 2;
        display: flex;
        justify-content: center;
    }

    .happy img {
        height: 35vh;
        width: 80vw;
        transform: none;
        object-fit: cover;
    }

    .input-container {
        position: static;
        transform: none;
        width: 90%;
        order: 3;
    }

    input[type="text"] {
        width: 100%;
        height: 7vh;
        font-size: 3vh;
        transform: none;
    }

    .serial {
        position: static;
        transform: none;
        margin-top: 0;
        width: 85vw;
        text-align: center;
        order: 4;
    }

    .serial:hover {
        transform: scale(1.05);
    }
}

    </style>
        <title>Verity</title>
    </head>
    <body>
        <div class="square">
         <div class="inner-square">
            <div class="input-container">
                <input type="text" id="artist-name" placeholder="ENTER SERIAL CODE" required>
            </div>         
            <h1 class="title">Verify your art!</h1>
            <div class="happy">
                <img src="magni.jpg">
            </div>
             <button class="serial">VERIFY</button>  
         </div>
        </div>

       <script>
       document.querySelector('.serial').addEventListener('click', () =>{
        const serialInput = document.querySelector('#artist-name').value.trim();

        if (!serialInput) {
            alert("Enter a serial code first")
            return;
        }

        window.location.href = `serial.html?sn=${encodeURIComponent(serialInput)}`;


       })
       </script>

    </body>
</html>
