<!DOCTYPE html>
<html>
    <head>
        <script src="https://google.com/recaptcha/api.js" async defer></script>
        <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&display=swap" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>

        
        * {
            box-sizing: border-box;
        }
        
        



        body{
         height: 100vh;
         display: flex;
         background-color: #99735a;
         flex-direction: column;
         justify-content: center;
         align-items: center;
         margin: 0;
         overflow: hidden;
        }

        .inner-square {
            width: 97.5%;
            height: 95%;
            background-color: #bb9f89;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
  
        .title{
         font-family: 'Instrument Serif', serif;
         font-size: 14.5vh;
         color:rgb(0, 37, 12);
         transform: translateY(10vh);

        }



        .happy img {
            height: 80vh;
            width: 26vw;
             transform: translateY(-5vh) translateX(72vh);
        }

        .square {
            width: 95vw;
            height: 95vh;
            background-color:#66472b;
            border-radius: 20px;
            display: flex;           
            flex-direction: column;  
            justify-content: center; 
            align-items: center;    
        }

        .input-container {
            display: flex;
            flex-direction: column;
            gap: 2vh;
            position: absolute;
            transform: translateY(-5vh) translateX(-40vw);
        }
 
        input[type="text"]{
            background: rgba(255, 255, 255, 0.2);
            border: 1vh solid #373d32;
            border-radius: 1vh;
            padding: 2vh, 3vh;
            width: 70vw;
            height: 12vw;
            font-family: 'Instrument Serif', serif;
            font-size: 10vh;
            color:#373d32;
            outline:none;
            transition: all 0.3s ease;
            transform: translateX(30vw) translateY(2vw);

        }

        input[type="text"]::placeholder {
            color: rgba(0, 37, 12, 0.6);
            font-weight: 300;
        }

        input[type="text"]:focus {
            background: rgba(255, 255, 255,0.4);
            border-color: #717e63;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }
   .serial {

            background-color:#97a886;
            color:#000000;
            padding: 3vh 7vh;
            border: 3px solid #373d32;
            border-radius: 18px;
            margin-top: 5vh;
            font-family: 'Instrument Serif', serif;
            font-size: 3vh;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s ease; 
            transform: translateY(-25vh) translateX(-40vw);
            position: relative;
            }

       
            .serial:hover {
            background-color: #cbcfb4;
            transform: translateY(-25vh) translateX(-40vw) scale(1.05);
            
           }

         

 @media (max-width: 768px) {

    html, body {
        overflow: auto;
    }
    
    body {
        overflow: hidden;
    }

    .inner-square {
        height: 97.5%;
        justify-content: flex-start;
        padding-top: 3vh;
        gap: 2vh;
    }

    .title {
        font-size: 5vh;
        transform: none;
        text-align: center;
        padding: 0 2vw;
        order: 1;
    }

    .input-container {
        position: static;
        transform: none;
        width: 90%;
        order: 2;
    }

    input[type="text"] {
        width: 100%;
        height: 7vh;
        font-size: 3vh;
        transform: none;
    }

    .happy {
        order: 3;
    }

    .happy img {
        height: 30vh;
        width: 50vw;
        transform: none;
    }

    .serial {
        transform: none;
        order: 4;
        margin-top: 2vh;
    }

    .serial:hover {
        transform: scale(1.05);
    }
}
    </style>
        <title>Verity</title>
    </head>
    <body>
        <div class="square">
         <div class="inner-square">
            <div class="input-container">
                <input type="text" id="artist-name" placeholder="ENTER ARTIST'S NAME" required>
                <input type="text" id="art-name" placeholder="ENTER ART'S NAME" required>
            </div>         
            <h1 class="title">Your art has been detected as Human!</h1>
            <div class="happy">
                <img src="happyhuman.png">
            </div>
             <button class="serial">NEXT</button>  
         </div>
        </div>

       <script>
         document.querySelector('.serial').addEventListener('click', async (e) => {
            const artist = document.querySelector('#artist-name').value;
            const art = document.querySelector('#art-name').value;
            const params = new URLSearchParams(window.location.search);
            const sn = params.get('sn');

            if (!artist || !art) {
                alert("Please fill out both fields!");
                e.preventDefault();
                return
            }

            const btn = e.target;
            btn.innerText = "SAVING...";
            btn.disabled = true;

            try{
                const response = await fetch('/update-metadata', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        serial: sn,
                        artist: artist,
                        art: art
                    })
                })
            

             if (response.ok){
              const finalUrl = `Final.html?artist=${encodeURIComponent(artist)}&art=${encodeURIComponent(art)}&sn=${encodeURIComponent(sn)}`;
            window.location.href = finalUrl;
             } else {
                alert("Error saving details.Please try again.");
                btn.innerText = "NEXT";
                btn.disabled = false;
             }
            } catch (err) {
                console.error(err);
                btn.disabled = false;
            }
            

         });
       </script>

    </body>
</html>
