<!DOCTYPE html>
<html>
    <head>
        <script src="https://google.com/recaptcha/api.js" async defer></script>
        <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&display=swap" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        
    <style>

        
        * {
            box-sizing: border-box;
        }
        
 
            .submit {

            background-color:#97a886;
            color:#000000;
            padding: 3vh 7vh;
            border: 3px solid #373d32;
            border-radius: 18px;
            margin-top: 5vh;
            font-family: 'Instrument Serif', serif;
            font-size: 3vh;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s ease; 
            transform: translateY(-1vh);
            position: relative;
            }


        body{
         height: 100vh;
         display: flex;
         background-color: #99735a;
         flex-direction: column;
         justify-content: center;
         align-items: center;
         margin: 0;
        }

        .inner-square {
            width: 97.5%;
            height: 95%;
            background-color: #bb9f89;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
  
        .title{
         font-family: 'Instrument Serif', serif;
         font-size: 12vh;
         color:rgb(58, 0, 0);
         transform: translateY(-37vh);
         position: absolute;

        }
        
            .submit:hover {
            background-color: #cbcfb4;
            transform: translateY(-1vh)scale(1.05);
            
        }


        .sad img {
            height: 70vh;
            width: 25vw;
            transform: translateY(7vh);
        }

        .square {
            width: 95vw;
            height: 95vh;
            background-color:#66472b;
            border-radius: 20px;
            display: flex;           
            flex-direction: column;  
            justify-content: center; 
            align-items: center;    
        }

        @media (max-width: 768px) {
                    * {
            box-sizing: border-box;
        }
